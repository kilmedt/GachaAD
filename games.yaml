settings:
  screenshot_region: null
  default_wait_after_launch: 30
  log_dir: logs
  image_dir: images
  confidence: 0.8
  retry:
    max_attempts: 3
    interval: 5
  cleanup:
    force_close: true
    timeout: 30
app:
  auto_start: false
  auto_execute: false
  theme: light
  minimize_to_tray: true
  log_level: INFO
pairs:
- name: 异环
  game:
    executable: E:/ElectronicGame/Yihuan/Neverness To Everness/Client/WindowsNoEditor/HT/Binaries/Win64/HTGame.exe
    auto_start: false
  tool:
    executable: E:/ElectronicGame/ok-nte/ok-nte.exe
    working_dir: E:/ElectronicGame/ok-nte
    cli_args: -t 2
    wait_for_exit: true
    timeout: 1800
    process_name: ok-nte
  launcher:
    executable: E:/ElectronicGame/Yihuan/Neverness To Everness/NTELauncher.exe
- name: 绝区零
  game:
    executable: D:/ElectronicGames/ZenlessZoneZero Game/ZenlessZoneZero.exe
    auto_start: false
    working_dir: D:/ElectronicGames/ZenlessZoneZero Game
    wait_after_launch: 30
  tool:
    executable: E:/ElectronicGame/ZZZOneDragon/OneDragon-Launcher.exe
    working_dir: E:/ElectronicGame/ZZZOneDragon
    cli_args: -o -c
    wait_for_exit: true
    timeout: 1800
    process_name: ''
    wait_after_launch: 10
    completion_timeout: 600
  launcher:
    executable: E:/ElectronicGame/miHoYo Launcher/launcher.exe
- name: 鸣潮
  game:
    executable: E:/WeGameApps/rail_apps/Wuthering Waves(2002137)/Wuthering Waves.exe
    auto_start: false
  launcher:
    executable: C:/Program Files (x86)/WeGame/WeGame.exe
  tool:
    executable: E:/ElectronicGame/ok-ww/ok-ww.exe
    working_dir: E:/ElectronicGame/ok-ww
    cli_args: -t 1
    wait_for_exit: true
    timeout: 1800
    process_name: ''
- name: 尘白禁区
  game:
    executable: E:/Snow/data/game/Game/Binaries/Win64/Game.exe
    auto_start: true
    working_dir: E:/Snow/data/game/Game/Binaries/Win64
    wait_after_launch: 30
  tool:
    executable: ''
    working_dir: ''
    cli_args: ''
